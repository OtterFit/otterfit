    <h1>番茄日日 Toma 隱私權政策</h1>
    <p>番茄日日 Toma 目前為本機版減重與飲食紀錄工具。餐點、熱量、體重、步數與目標設定會儲存在使用者裝置的瀏覽器 localStorage 中，不會主動上傳到伺服器。</p>
    <h2>資料使用</h2>
    <p>資料僅用於顯示熱量統計、體重進度、AI 估算結果與減重建議。若未來串接雲端 AI 圖片辨識或帳號同步，會在功能上線前更新本政策並提示使用者。</p>
    <h2>醫療聲明</h2>
    <p>本 App 提供一般健康與飲食管理參考，不構成醫療建議。若有慢性病、特殊飲食限制、懷孕、用藥或醫師指示，請先諮詢專業醫療人員。</p>
