<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>番茄日日 Toma 手機版預覽</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        background: #f4f0e9;
        color: #201f24;
        font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
      }
      .review-wrap {
        display: grid;
        gap: 18px;
        justify-items: center;
      }
      .review-note {
        width: min(390px, 100%);
        padding: 14px 16px;
        border-radius: 18px;
        background: #fffaf4;
        border: 1px solid rgba(122, 74, 54, 0.14);
        box-shadow: 0 16px 44px rgba(58, 37, 30, 0.1);
      }
      .review-note p {
        margin: 0;
        line-height: 1.55;
        font-weight: 800;
      }
      .phone {
        width: 390px;
        max-width: calc(100vw - 24px);
        height: 844px;
        max-height: calc(100vh - 160px);
        padding: 12px;
        border-radius: 42px;
        background: #161616;
        box-shadow: 0 28px 90px rgba(28, 22, 18, 0.28);
      }
      .screen {
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 32px;
        background: #fff;
      }
      iframe {
        width: 390px;
        height: 844px;
        max-width: 100%;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="review-wrap">
      <section class="review-note">
        <p>這是番茄日日 Toma 的手機版首頁預覽，請以高級、直覺、拍照紀錄為核心，評估版面、色彩、資訊層級與 CTA。</p>
      </section>
      <section class="phone" aria-label="手機版 App 預覽">
        <div class="screen">
          <iframe src="./index.html?fresh=gemini-mobile-v1" title="番茄日日 Toma mobile preview"></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
